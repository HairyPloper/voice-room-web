name: Deploy to GitHub Pages (with Branch Logic)(minified)
on:
  push:
    branches: [ main, dev_b ] # Triggers on both live and testing branches

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Minifier
        run: npm install -g terser

      - name: Build Assets
        run: |
          mkdir -p dist/js
          cat js/main.js js/utils.js js/ui.js js/rtc.js js/chat.js > dist/combined.js
          terser dist/combined.js -o dist/js/bundle.min.js --compress --mangle
          cp index.html dist/index.html
          cp -r css dist/css || true
          cp -r src dist/src || true

      - name: Update HTML to use Bundle
        run: |
          sed -i '/<script src="js\/main.js"><\/script>/i <script src="js/bundle.min.js"></script>' dist/index.html
          sed -i '/js\/.*\.js/d' dist/index.html

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages
          # Logic: If branch is main, deploy to root. If dev_b, deploy to 'dev' folder.
          target-folder: ${{ github.ref == 'refs/heads/main' && '/' || 'dev' }}
          # Logic: Only delete old files if we are updating the root (main). 
          # This prevents the 'dev' deployment from wiping the 'main' site.
          clean: ${{ github.ref == 'refs/heads/main' }}