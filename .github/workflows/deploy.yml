name: Deploy to GitHub Pages
on:
  push:
    branches: [ main, dev_b ]
  workflow_dispatch: # Allows manual trigger from the Actions tab

permissions:
  contents: write # Essential to allow the action to push to gh-pages

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Minifier
        run: npm install -g terser

      - name: Build and Bundle
        run: |
          mkdir -p dist/js
          cp index.html dist/index.html
          cp -r css dist/css || true
          cp -r src dist/src || true

          # Logic to handle different branch structures
          if [ "${{ github.ref_name }}" == "dev_b" ]; then
            echo "Processing dev_b: Bundling 5 files..."
            cat js/main.js js/utils.js js/ui.js js/rtc.js js/chat.js > dist/combined.js
            terser dist/combined.js -o dist/js/bundle.min.js --compress --mangle
            
            # Replace multiple scripts with one bundle
            sed -i '/<script src="js\/main.js"><\/script>/i <script src="js/bundle.min.js"></script>' dist/index.html
            sed -i '/js\/.*\.js/d' dist/index.html
          else
            echo "Processing main: Minifying single main.js..."
            terser js/main.js -o dist/js/bundle.min.js --compress --mangle
            
            # Update main's HTML to point to the new minified bundle
            sed -i 's/js\/main.js/js\/bundle.min.js/g' dist/index.html
          fi

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages
          target-folder: ${{ github.ref_name == 'main' && '/' || 'dev' }}
          
          # CHANGE THIS: 
          # Instead of complex excludes, set clean to false when pushing to dev_b.
          # This prevents rsync from trying to "verify" the rest of the branch.
          clean: ${{ github.ref_name == 'main' }} 
          
          # Only use exclude when we are cleaning the root (main)
          clean-exclude: |
            ${{ github.ref_name == 'main' && 'dev' || '' }}